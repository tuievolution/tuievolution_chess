name: tuievolution_chess
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # --- TUANA'NIN BACKEND PAKETLERİ ---
  supabase_flutter: ^2.4.0  # Veritabanı ve kimlik doğrulama işlemleri için
  csv: ^5.0.2               # openings.csv dosyasını okuyup ayrıştırmak için
  chess: 0.8.1             # Hamleleri simüle edip tahtanın anlık FEN kodunu üretmek için
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Veri setini uygulamanın içine dahil ediyoruz
  assets:
    - assets/openings.csv
    - .env